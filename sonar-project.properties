# SonarCloud Project Configuration
# https://sonarcloud.io
#
# Setup:
#   1. Register at https://sonarcloud.io and import this GitHub repo
#   2. Set organization key below (your SonarCloud org, typically your GitHub handle)
#   3. Add SONAR_TOKEN as GitHub Actions secret (Settings → Secrets → Actions)

sonar.projectKey=paulefl_beaglebone_black
sonar.organization=paulefl
sonar.projectName=BeagleBone Black
sonar.projectVersion=1.1.0

# ── Sources ───────────────────────────────────────────────────────────────────
sonar.sources=go-api/cmd,go-api/pkg,c-lib/src,c-lib/include,tools
sonar.tests=go-api/pkg,tests
sonar.test.inclusions=**/*_test.go,tests/**/*.py
sonar.exclusions=**/vendor/**,go-api/libs/**,**/testdata/**,bin/**

# ── C/C++ Analyse deaktiviert ─────────────────────────────────────────────────
# SonarCloud benötigt eine Compilation Database (sonar.cfamily.compile-commands)
# für C/C++ Analyse. C-Findings werden stattdessen via clang-tidy SARIF geliefert (#52).
sonar.c.file.suffixes=-
sonar.cpp.file.suffixes=-
sonar.objc.file.suffixes=-

# ── Go ────────────────────────────────────────────────────────────────────────
sonar.go.coverage.reportPaths=reports/go-coverage.xml
sonar.testExecutionReportPaths=reports/go-tests-sonar.xml

# ── Python ────────────────────────────────────────────────────────────────────
sonar.python.version=3.12
sonar.python.coverage.reportPaths=reports/python-coverage.xml
sonar.python.xunit.reportPath=reports/pytest-junit.xml

# ── SARIF Reports (Static Analysis) ──────────────────────────────────────────
sonar.sarifReportPaths=reports/shell-lint.sarif

# ── Quality Gates ─────────────────────────────────────────────────────────────
# Configured via SonarCloud UI:
#   - Coverage ≥ 75% (Go), ≥ 60% (Python)
#   - 0 new Bugs / Vulnerabilities block merge
