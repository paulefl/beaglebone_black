name: Bausteinsicht

on:
  push:
    branches: [main]
    paths:
      - 'arch/model/**'
  pull_request:
    paths:
      - 'arch/model/**'
  workflow_dispatch:

jobs:
  bausteinsicht:
    name: Validate and export architecture diagrams
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Bausteinsicht container image
        run: scripts/bausteinsicht-container.sh build

      - name: Validate model
        run: scripts/bausteinsicht-container.sh validate

      - name: Export diagrams
        run: scripts/bausteinsicht-container.sh export --output /model/export

      - name: Upload exported diagrams
        uses: actions/upload-artifact@v4
        with:
          name: bausteinsicht-export
          path: arch/model/export/
          if-no-files-found: warn
