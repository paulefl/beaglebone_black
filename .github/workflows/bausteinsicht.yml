name: Bausteinsicht

on:
  push:
    branches: [main]
    paths:
      - 'arch/model/**'
  pull_request:
    paths:
      - 'arch/model/**'
  workflow_dispatch:

jobs:
  bausteinsicht:
    name: Validate and export architecture diagrams
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Make bausteinsicht binary executable
        run: chmod +x scripts/bausteinsicht

      - name: Validate model
        run: scripts/bausteinsicht validate --model arch/model/beaglebone_black.jsonc

      - name: Create export directories
        run: mkdir -p arch/model/export/plantuml arch/model/export/mermaid arch/model/export/table

      - name: Export PlantUML C4 diagrams
        run: |
          scripts/bausteinsicht export-diagram \
            --model arch/model/beaglebone_black.jsonc \
            --diagram-format plantuml \
            --output arch/model/export/plantuml

      - name: Export Mermaid C4 diagrams
        run: |
          scripts/bausteinsicht export-diagram \
            --model arch/model/beaglebone_black.jsonc \
            --diagram-format mermaid \
            --output arch/model/export/mermaid

      - name: Export element table (Markdown)
        run: |
          scripts/bausteinsicht export-table \
            --model arch/model/beaglebone_black.jsonc \
            --table-format md \
            --combined \
            --output arch/model/export/table

      - name: Export PNG diagrams
        continue-on-error: true  # draw.io requires Xvfb/GPU
        run: |
          mkdir -p arch/model/export/png
          scripts/bausteinsicht export \
            --model arch/model/beaglebone_black.jsonc \
            --output arch/model/export/png

      - name: Commit export changes
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add arch/model/export/
          if git diff --staged --quiet; then
            echo "No changes in arch/model/export — nothing to commit."
          else
            git commit -m "ci(bausteinsicht): update exported diagrams [skip ci]"
            git push
          fi

      - name: Upload exported artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bausteinsicht-export
          path: arch/model/export/
          if-no-files-found: warn
