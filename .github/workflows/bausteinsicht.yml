name: Bausteinsicht

on:
  push:
    branches: [main]
    paths:
      - 'arch/model/**'
  pull_request:
    paths:
      - 'arch/model/**'
  workflow_dispatch:

jobs:
  bausteinsicht:
    name: Validate and export architecture diagrams
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Build Bausteinsicht container image
        run: scripts/bausteinsicht-container.sh build

      - name: Validate model
        run: scripts/bausteinsicht-container.sh validate

      - name: Export PNG diagrams
        run: |
          mkdir -p arch/model/export/png
          scripts/bausteinsicht-container.sh export --output /model/export/png

      - name: Export PlantUML C4 diagrams
        run: |
          mkdir -p arch/model/export/plantuml
          scripts/bausteinsicht-container.sh export-diagram \
            --diagram-format plantuml --output /model/export/plantuml

      - name: Export Mermaid C4 diagrams
        run: |
          mkdir -p arch/model/export/mermaid
          scripts/bausteinsicht-container.sh export-diagram \
            --diagram-format mermaid --output /model/export/mermaid

      - name: Export element table (Markdown)
        run: |
          mkdir -p arch/model/export/table
          scripts/bausteinsicht-container.sh export-table \
            --table-format md --combined --output /model/export/table

      - name: Commit export changes
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add arch/model/export/
          if git diff --staged --quiet; then
            echo "No changes in arch/model/export — nothing to commit."
          else
            git commit -m "ci(bausteinsicht): update exported diagrams [skip ci]"
            git push
          fi

      - name: Upload exported artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bausteinsicht-export
          path: arch/model/export/
          if-no-files-found: warn
