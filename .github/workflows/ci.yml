name: CI

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  # ── Go HAL Unit Tests (kein Hardware nötig) ──
  test-go:
    name: Go Unit Tests
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4


      - uses: paulefl/beaglebone-tooling/.github/actions/go-test@v1.1.18
        with:
          coverpkg: './pkg/hal/,./pkg/hal/mock/,./pkg/hal/config/'
          test-packages: './pkg/hal/ ./pkg/hal/mock/ ./pkg/hal/config/'
          codecov-flags: hal-unit-tests

  # ── C Coverage ───────────────────────────────
  test-c:
    name: C Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: paulefl/beaglebone-tooling/.github/actions/c-test@v1.1.18

  # ── Go Lint ──────────────────────────────────
  lint-go:
    name: Go Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: paulefl/beaglebone-tooling/.github/actions/go-lint@v1.1.18

  # ── Web GUI Validierung ───────────────────────
  test-web:
    name: Web GUI Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: paulefl/beaglebone-tooling/.github/actions/html-validate@v1.1.18

  # ── Shell Script Syntax ───────────────────────
  test-scripts:
    name: Script Syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: paulefl/beaglebone-tooling/.github/actions/shellcheck@v1.1.18
        with:
          include-tooling: 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Python Tests (API Mock) ───────────────────
  test-python:
    name: Python Tests
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: paulefl/beaglebone-tooling/.github/actions/python-test@v1.1.18

  # ── CLI Build (Multi-Plattform) ───────────────
  build-cli:
    name: Build CLI
    runs-on: ubuntu-latest
    needs: [test-go, lint-go]
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            name: bbcli-linux-amd64
          - goos: linux
            goarch: arm
            goarm: "7"
            name: bbcli-linux-armv7
          - goos: darwin
            goarch: amd64
            name: bbcli-darwin-amd64
          - goos: darwin
            goarch: arm64
            name: bbcli-darwin-arm64
          - goos: windows
            goarch: amd64
            name: bbcli-windows-amd64.exe
    steps:
      - uses: actions/checkout@v4
      - uses: paulefl/beaglebone-tooling/.github/actions/go-build@v1.1.18
        with:
          working-directory: tools/cli
          output-path:       bin/${{ matrix.name }}
          goos:              ${{ matrix.goos }}
          goarch:            ${{ matrix.goarch }}
          goarm:             ${{ matrix.goarm }}
          ldflags:           '-s -w -X main.Version=${{ github.ref_name }}'
          artifact-name:     ${{ matrix.name }}

  # ── TUI Build ────────────────────────────────
  build-tui:
    name: Build TUI
    runs-on: ubuntu-latest
    needs: [lint-go]
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            name: bbtui-linux-amd64
          - goos: linux
            goarch: arm
            goarm: "7"
            name: bbtui-linux-armv7
          - goos: darwin
            goarch: amd64
            name: bbtui-darwin-amd64
    steps:
      - uses: actions/checkout@v4
      - uses: paulefl/beaglebone-tooling/.github/actions/go-build@v1.1.18
        with:
          working-directory: tools/tui
          output-path:       bin/${{ matrix.name }}
          goos:              ${{ matrix.goos }}
          goarch:            ${{ matrix.goarch }}
          goarm:             ${{ matrix.goarm }}
          artifact-name:     ${{ matrix.name }}

  # ── StrictDoc Requirements Export ────────────
  strictdoc:
    name: StrictDoc Export & Validation
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4


      - uses: paulefl/beaglebone-tooling/.github/actions/strictdoc@v1.1.18

  # ── Python Security Scan (bandit) ────────────
  security-python:
    name: Python Security Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: paulefl/beaglebone-tooling/.github/actions/python-security@v1.1.18

    # ── SonarCloud Quality Analysis ───────────────
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: [test-go, test-c, test-python, strictdoc, security-python]
    if: always()
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # vollständige History für blame/annotations

      - uses: paulefl/beaglebone-tooling/.github/actions/sonarcloud@v1.1.18
        with:
          sonar-token: ${{ secrets.SONAR_TOKEN }}

      - uses: paulefl/beaglebone-tooling/.github/actions/sonarqube-report@main
        with:
          sonar-token: ${{ secrets.SONAR_TOKEN }}
          project-key: paulefl_beaglebone_black

  # ── Test Report + Trend ───────────────────────
  report:
    name: Test Report
    runs-on: ubuntu-latest
    needs: [test-go, lint-go, test-web, test-scripts, test-python, build-cli, strictdoc, sonarcloud]
    if: always()
    permissions:
      contents: write   # für GitHub Pages Push
      pages:    write
      id-token: write
    steps:
      - uses: actions/checkout@v4


      - uses: paulefl/beaglebone-tooling/.github/actions/test-report@v1.1.18
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}


  # ── Changelog Update ──────────────────────────
  changelog:
    name: Update Changelog
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Unreleased section with git-cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --unreleased --output unreleased.md
        env:
          OUTPUT: unreleased.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Prepend unreleased section to CHANGELOG.md
        run: |
          if [ -s unreleased.md ]; then
            cat unreleased.md CHANGELOG.md > CHANGELOG.md.tmp
            mv CHANGELOG.md.tmp CHANGELOG.md
            rm unreleased.md
          fi

      - name: Commit updated CHANGELOG.md via PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          if git diff --cached --quiet; then
            echo "No changelog changes — nothing to commit."
            exit 0
          fi
          BRANCH="ci/update-changelog-$(echo ${{ github.sha }} | cut -c1-7)"
          git checkout -b "$BRANCH"
          git commit -m "docs(changelog): update unreleased section [skip ci]"
          git push origin "$BRANCH"
          gh pr create \
            --title "docs(changelog): update unreleased section [skip ci]" \
            --body "Automated changelog update via git-cliff. Auto-merged by CI." \
            --base main --head "$BRANCH"
          gh pr merge "$BRANCH" --squash --delete-branch --admin

  # ── Release ───────────────────────────────────
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build-cli, build-tui, test-python, test-scripts]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v8
        with:
          path: bin/
          merge-multiple: true
      - name: Checksums
        run: |
          cd bin
          find . -maxdepth 1 -type f | sort | xargs sha256sum > checksums.sha256
          cat checksums.sha256
      - name: Version aus Makefile lesen
        id: version
        run: echo "version=$(make version)" >> $GITHUB_OUTPUT

      - name: Changelog-Section für Release extrahieren
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Extract section between [VERSION] and the next [
          awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md > release_notes.md
          echo "Release notes for v${VERSION}:"
          cat release_notes.md

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            bin/bbcli-*
            bin/bbtui-*
            bin/checksums.sha256
          body_path: release_notes.md
          name: "v${{ steps.version.outputs.version }}"
