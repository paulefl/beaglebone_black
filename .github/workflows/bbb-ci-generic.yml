name: BBB CI/CD (Generic Container Build + Deploy)

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: self-hosted
    name: Build, Test & Deploy to BBB
    steps:
      - uses: actions/checkout@v4

      - uses: ./actions/generic-container-build
        with:
          source_dir: ./project
          output_dir: ./bin
          container_image: generic-builder
          build_commands: |
            set -e
            mkdir -p /output
            echo "=== Build C ==="
            arm-linux-gnueabihf-gcc \
              -o /output/bme260_main \
              /src/c/src/main.c \
              /src/c/src/bme260.c \
              -I /src/c/include -lm

            echo "=== Build Rust ==="
            cargo build \
              --target armv7-unknown-linux-gnueabihf \
              --release \
              --manifest-path /src/rust/Cargo.toml

            cp /src/rust/target/armv7-unknown-linux-gnueabihf/release/rust_app /output/

            echo "=== Build Go ==="
            GOOS=linux GOARCH=arm GOARM=7 go build -o /output/go_app /src/go/main.go

          test_commands: |
            echo "=== Run Python Tests (host binaries only) ==="
            pytest /src/python_tests || true

      - name: Prepare SSH Key for BBB
        shell: bash
        env:
          BBB_SSH_KEY: ${{ secrets.BBB_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf "%s\n" "$BBB_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.BBB_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to BBB
        shell: bash
        env:
          BBB_HOST: ${{ secrets.BBB_HOST }}
          BBB_USER: ${{ secrets.BBB_USER }}
          BBB_SSH_KEY: ${{ secrets.BBB_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf "%s\n" "$BBB_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          scp -i ~/.ssh/id_rsa bin/* $BBB_USER@$BBB_HOST:/home/$BBB_USER/bin/

      - name: Run Tests on BBB
        shell: bash
        env:
          BBB_HOST: ${{ secrets.BBB_HOST }}
          BBB_USER: ${{ secrets.BBB_USER }}
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no $BBB_USER@$BBB_HOST "
            set -e
            mkdir -p /home/$BBB_USER/bin/logs
            /home/$BBB_USER/bin/bme260_main | tee /home/$BBB_USER/bin/logs/c.log
            /home/$BBB_USER/bin/rust_app | tee /home/$BBB_USER/bin/logs/rust.log
            /home/$BBB_USER/bin/go_app | tee /home/$BBB_USER/bin/logs/go.log
          "

      - name: Fetch Test Logs from BBB
        shell: bash
        env:
          BBB_HOST: ${{ secrets.BBB_HOST }}
          BBB_USER: ${{ secrets.BBB_USER }}
        run: |
          mkdir -p logs
          scp -i ~/.ssh/id_rsa -r $BBB_USER@$BBB_HOST:/home/$BBB_USER/bin/logs/* ./logs/
