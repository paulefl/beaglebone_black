name: BBB CI/CD + Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-deploy-release:
    runs-on: self-hosted
    name: Build, Test, Deploy & Release
    steps:
      - uses: actions/checkout@v4

      - uses: ./actions/generic-container-build
        with:
          source_dir: ./project
          output_dir: ./bin
          container_image: generic-builder
          build_commands: |
            echo "=== Build C ==="
            arm-linux-gnueabihf-gcc -o /output/bme260_main /src/c/main.c /src/c/bme260.c -I /src/c/include -lm &&
            echo "=== Build Rust ==="
            rustc --target=armv7-unknown-linux-gnueabihf -o /output/rust_app /src/rust/rust_app.rs &&
            echo "=== Build Go ==="
            GOOS=linux GOARCH=arm GOARM=7 go build -o /output/go_app /src/go/main.go
          test_commands: |
            echo "=== Run Python Tests ==="
            python3 /src/tests/test_bme260.py
      # -------------------------
      # List binaries for debug
      # -------------------------
      - name: List generated binaries
        shell: bash
        run: ls -l ./bin

      # -------------------------
      # Setup SSH Key for BBB
      # -------------------------
      - name: Prepare SSH Key
        shell: bash
        env:
          BBB_SSH_KEY: ${{ secrets.BBB_SSH_KEY }}
          BBB_HOST: ${{ secrets.BBB_HOST }}
          BBB_USER: ${{ secrets.BBB_USER }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf "%s\n" "$BBB_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $BBB_HOST >> ~/.ssh/known_hosts

      # -------------------------
      # Deploy binaries to BBB
      # -------------------------
      - name: Deploy Binaries to BBB
        shell: bash
        env:
          BBB_HOST: ${{ secrets.BBB_HOST }}
          BBB_USER: ${{ secrets.BBB_USER }}
        run: |
          scp -i ~/.ssh/id_rsa ./bin/* $BBB_USER@$BBB_HOST:/home/$BBB_USER/bin/

      # -------------------------
      # Run tests on BBB
      # -------------------------
      - name: Run Tests on BBB
        shell: bash
        env:
          BBB_HOST: ${{ secrets.BBB_HOST }}
          BBB_USER: ${{ secrets.BBB_USER }}
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no $BBB_USER@$BBB_HOST "
            set -e
            mkdir -p /home/$BBB_USER/bin/logs
            /home/$BBB_USER/bin/bme260_main | tee /home/$BBB_USER/bin/logs/c.log
            /home/$BBB_USER/bin/rust_app | tee /home/$BBB_USER/bin/logs/rust.log
            /home/$BBB_USER/bin/go_app | tee /home/$BBB_USER/bin/logs/go.log
          "

      # -------------------------
      # Fetch logs back to runner
      # -------------------------
      - name: Fetch Test Logs
        shell: bash
        env:
          BBB_HOST: ${{ secrets.BBB_HOST }}
          BBB_USER: ${{ secrets.BBB_USER }}
        run: |
          mkdir -p logs
          scp -i ~/.ssh/id_rsa -r $BBB_USER@$BBB_HOST:/home/$BBB_USER/bin/logs/* ./logs/
