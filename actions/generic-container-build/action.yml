name: Generic Container Build + Test
description: Build C/Rust/Go and run tests inside a container, with verified output for BBB deploy

inputs:
  source_dir:
    description: Source code directory (host path)
    required: true
  output_dir:
    description: Output directory for binaries (host path)
    required: true
  container_image:
    description: Container image to use for building
    required: true
  build_commands:
    description: Multi-line shell commands to build binaries
    required: true
  test_commands:
    description: Multi-line shell commands to run tests
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Build container
      shell: bash
      run: |
        podman build -t "${{ inputs.container_image }}" -f docker/builder/Dockerfile docker/builder
    - name: Ensure output directory exists
      shell: bash
      run: |
        echo "Ensuring output directory exists: $OUTPUT_DIR"
        mkdir -p "$OUTPUT_DIR"
      env:
        OUTPUT_DIR: ${{ inputs.output_dir }}

    - name: Run build inside container
      shell: bash
      run: |
        echo "Starting build in container ${CONTAINER_IMAGE}..."
        podman run --rm \
          -v "$OUTPUT_DIR:/output" \
          -v "$SOURCE_DIR:/src" \
          "$CONTAINER_IMAGE" \
          -c ${BUILD_COMMANDS}
          EOF
      env:
        OUTPUT_DIR: ${{ inputs.output_dir }}
        SOURCE_DIR: ${{ inputs.source_dir }}
        CONTAINER_IMAGE: ${{ inputs.container_image }}
        BUILD_COMMANDS: ${{ inputs.build_commands }}

    - name: Run tests inside container
      shell: bash
      if: ${{ inputs.test_commands != '' }}
      run: |
        echo "Running tests inside container ${CONTAINER_IMAGE}..."
        podman run --rm \
          -v "$SOURCE_DIR:/src" \
          "$CONTAINER_IMAGE" \
          -c ${TEST_COMMANDS}
          "
      env:
        CONTAINER_IMAGE: ${{ inputs.container_image }}
        TEST_COMMANDS: ${{ inputs.test_commands }}
        OUTPUT_DIR: ${{ inputs.output_dir }}
        SOURCE_DIR: ${{ inputs.source_dir }}


    - name: List built binaries
      shell: bash
      run: |
        echo "Built files in output directory ($OUTPUT_DIR):"
        ls -l "$OUTPUT_DIR"
      env:
        OUTPUT_DIR: ${{ inputs.output_dir }}