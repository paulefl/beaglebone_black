name: Generic Container Build + Test
description: Build any code (C/Rust/Go) and run tests inside a container
inputs:
  source_dir:
    required: true
  output_dir:
    required: true
  container_image:
    required: true
  build_commands:
    required: true
  test_commands:
    required: false
    default: ""
runs:
  using: "composite"
  steps:
    - name: Ensure output directory exists
      shell: bash
      run: mkdir -p ${{ inputs.output_dir }}
    - name: Build Container
      shell: bash
      run: podman build -t ${{ inputs.container_image }} docker/builder
    - name: Run Build Commands inside Container
      shell: bash
      run: |
        set -e
        podman run --rm -v ${{ inputs.output_dir }}:/output -v ${{ inputs.source_dir }}:/src ${{ inputs.container_image }} /bin/bash -c "${{ inputs.build_commands }}"
    - name: Run Test Commands inside Container
      if: ${{ inputs.test_commands != '' }}
      shell: bash
      run: |
        set -e
        podman run --rm -v ${{ inputs.source_dir }}:/src ${{ inputs.container_image }} /bin/bash -c "${{ inputs.test_commands }}"